    <!-- Neural dots -->
    <circle cx="-70" cy="-20" r="8" fill="#a5b4fc"/>
    <circle cx="70" cy="-20" r="8" fill="#a5b4fc"/>
    <circle cx="-90" cy="20" r="6" fill="#c7d2fe"/>
    <circle cx="90" cy="20" r="6" fill="#c7d2fe"/>
    <circle cx="-50" cy="40" r="7" fill="#a5b4fc"/>
    <circle cx="50" cy="40" r="7" fill="#a5b4fc"/>
  </g>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
