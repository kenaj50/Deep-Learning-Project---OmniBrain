    <path d="M-80,-60 C-120,-80 -140,-40 -120,0 C-140,10 -130,50 -100,60 C-80,70 -60,50 -40,40 L-40,-40 C-60,-50 -70,-55 -80,-60 Z"
          fill="#6366f1" opacity="0.9"/>
    <!-- Right hemisphere -->
